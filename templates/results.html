{% extends "base.html" %} {% block title %}Game Review{% endblock %}{% block
    content %}
    <style>
        .custom-restricted-width {
            display: inline-block;
            width: 100%;
            justify-content: space-around;
        }
        .pure-menu-link {
            background: none;
            border: none;
            color: antiquewhite;
        }
        .pure-menu-heading {
            font-size: 3.25rem;
            padding: 0.75rem;
            color: antiquewhite;
            text-align: center;
            width: 100%;
        }
        .pure-menu-list
        {
            columns: 3 auto;
            flex-wrap: wrap;
            justify-content: space-evenly;
            width: 100%;
        }
    </style>
    <div class="results-section" style="display: flex; justify-content: center; align-items: center;">
        <form class="pure-form" id="resultsForm" method = "post" action="/redirects" style="text-align: center;" >
            <div class="pure-menu custom-restricted-width">
                <span class="pure-menu-heading">Search Results</span>
                <ul class="pure-menu-list">
                    {% for key, value in results.items() %}    
                    <li class="pure-menu-item">
                        <button type="submit" 
                        class="pure-menu-link" 
                        name="selection" 
                        value ={{value}} 
                        onclick="submitResult({{key}})">{{value}}</button>
                    </li>
                    {% endfor%}
                </ul>
                
                <input type="hidden" name="selectedResult" id="selectedResult">
                <input type="hidden" name="filter" id="filter" value={{filter}}>
            </div>
          </form>
    </div>   
    <div>
        <p style="text-align: center;">If you do not see what you are looking for try having a more complete search</p>
    </div>

    <script>
        function submitResult(key) {
            document.getElementById('selectedResult').value = key; 
            document.getElementById('resultsForm').submit(); 
        }
    </script>

    {% endblock %}
