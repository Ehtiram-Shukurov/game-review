{% extends 'base.html' %} {% block title %}Settings{% endblock %} {% block
content %}

<div class="user-menu">
  <a
    href="{{ url_for('user_profile', user_id=user.get('user_id')) }}"
    class="menu-item {% if active_page == 'profile' %}active{% endif %}"
    >Profile</a
  >
  <a
    href="{{ url_for('user_reviews', user_id=profile_info.user_id) }}"
    class="menu-item {% if active_page == 'reviews' %}active{% endif %}"
    >Reviews</a
  >
  <a
    href="/user/settings"
    class="menu-item {% if active_page == 'settings' %}active{% endif %}"
    >Settings</a
  >
</div>

<div class="settings-container">
  <div
    class="profile-image-container"
    style="text-align: center; margin-bottom: 20px"
  >
    <img
      src="{% if profile_info.picture %}data:image/jpeg;base64,{{ profile_info.picture }}{% else %}/static/images/avatar.png{% endif %}"
      alt="Profile Image"
      class="profile-image"
    />
  </div>

  <form
    class="pure-form pure-form-aligned"
    method="POST"
    enctype="multipart/form-data"
    action="{{ url_for('user_settings')}}"
  >
    <fieldset>
      <div class="pure-control-group">
        <label for="picture">Change Profile Image:</label>
        <input id="picture" name="picture" type="file" accept="image/*" />
      </div>

      <div class="pure-control-group">
        <label for="new-username">Username:</label>
        <input
          id="new-username"
          name="new-username"
          type="text"
          value="{{ profile_info.get('username') }}"
          required
        />
      </div>

      <div class="pure-control-group">
        <label for="new-email">Email:</label>
        <input
          id="new-email"
          name="new-email"
          type="email"
          value="{{ profile_info.get('email') }}"
          required
        />
      </div>

      <div class="pure-control-group">
        <label for="descript">Description:</label>
        <textarea id="descript" name="descript" rows="4" cols="50">
  {{ profile_info.get('descript') }}</textarea
        >
      </div>

      <div class="pure-controls">
        <button type="button" class="pure-button delete-button">
          Delete Account
        </button>
        <button
          type="submit"
          class="pure-button pure-button-primary save-button"
        >
          Save Changes
        </button>
      </div>
    </fieldset>
  </form>
</div>

{% endblock %}
