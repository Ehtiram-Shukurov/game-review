{% extends 'base.html' %} {% block title %}Settings{% endblock %} {% block
content %}

<div class="user-menu">
  <a
    href="/user/profile/{{ user_sub }}"
    class="menu-item {% if active_page == 'profile' %}active{% endif %}"
    >Profile</a
  >
  <a
    href="/user/reviews/{{ user_sub }}"
    class="menu-item {% if active_page == 'reviews' %}active{% endif %}"
    >Reviews</a
  >
  <a
    href="/user/settings/{{ user_sub }}"
    class="menu-item {% if active_page == 'settings' %}active{% endif %}"
    >Settings</a
  >
</div>

<div class="settings-container">
  <div
    class="profile-image-container"
    style="text-align: center; margin-bottom: 20px"
  >
    <img
      id="profile-image-preview"
      src="{{ url_for('static', filename=profile_image) }}"
      alt="Profile Image"
      class="profile-image"
    />
  </div>

  <form
    class="pure-form pure-form-aligned"
    method="POST"
    enctype="multipart/form-data"
    action="{{ url_for('user_settings', user_sub=user_sub) }}"
  >
    <fieldset>
      <div class="pure-control-group">
        <label for="profile_image">Change Profile Image:</label>
        <input
          id="profile_image"
          name="profile_image"
          type="file"
          accept="image/*"
        />
      </div>

      <div class="pure-control-group">
        <label for="new-username">Username:</label>
        <input
          id="new-username"
          name="new-username"
          type="text"
          value="{{ username }}"
          required
        />
      </div>

      <div class="pure-control-group">
        <label for="new-email">Email:</label>
        <input
          id="new-email"
          name="new-email"
          type="email"
          value="{{ email }}"
          required
        />
      </div>

      <div class="pure-control-group">
        <label for="descript">Description:</label>
        <textarea id="descript" name="descript" rows="4" cols="50">
{{ descript }}</textarea
        >
      </div>

      <div class="pure-controls">
        <button type="button" class="pure-button delete-button">
          Delete Account
        </button>
        <button
          type="submit"
          class="pure-button pure-button-primary save-button"
        >
          Save Changes
        </button>
      </div>
    </fieldset>
  </form>
</div>

{% endblock %}
